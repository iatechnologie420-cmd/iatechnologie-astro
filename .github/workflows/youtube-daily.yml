name: Daily YouTube Sync

on:
  schedule:
    # S'exécute tous les jours à minuit (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permet de lancer l'action manuellement depuis l'interface GitHub

jobs:
  sync_youtube:
    runs-on: ubuntu-latest
    
    steps:
      - name: Vérifier le code (Checkout)
        uses: actions/checkout@v4
        
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Installer les dépendances
        run: npm ci
        
      - name: Mettre à jour les statistiques YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: npm run sync-youtube
        
      - name: Commit et Push des nouvelles données
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add src/data/youtube-videos.json
          git commit -m "chore: actualisation automatique des stats YouTube" || exit 0
          git push
